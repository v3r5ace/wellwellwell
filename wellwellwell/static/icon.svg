<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e3"/>
      <stop offset="100%" stop-color="#d8cfba"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="well" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5d6c63"/>
      <stop offset="100%" stop-color="#213027"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Well casing -->
  <rect x="176" y="80" width="160" height="352" rx="18" fill="url(#well)" opacity="0.9"/>
  <!-- Inner well opening -->
  <rect x="196" y="100" width="120" height="312" rx="10" fill="#e9e2d0"/>
  <!-- Water fill -->
  <rect x="196" y="222" width="120" height="190" rx="10" fill="url(#water)" opacity="0.85"/>
  <!-- Cable line -->
  <line x1="256" y1="80" x2="256" y2="210" stroke="#5d6c63" stroke-width="3" stroke-dasharray="8,6"/>
  <!-- Marker weight (pink) -->
  <rect x="244" y="198" width="24" height="40" rx="6" fill="#c2185b"/>
  <rect x="248" y="202" width="16" height="32" rx="4" fill="#f48fb1" opacity="0.5"/>
  <!-- Well cap -->
  <rect x="160" y="68" width="192" height="28" rx="10" fill="url(#well)"/>
  <!-- Water ripple lines -->
  <path d="M210 226 Q226 218, 242 226 Q258 234, 274 226 Q290 218, 306 226" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" stroke-linecap="round"/>
</svg>
